<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlitch" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0b122c" />
      <stop offset="100%" stop-color="#050816" />
    </radialGradient>

    <linearGradient id="gridFade" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#050816" stop-opacity="1" />
      <stop offset="50%" stop-color="#050816" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#050816" stop-opacity="0.8" />
    </linearGradient>

    <filter id="bloom" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="24" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="titaniumShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="15%" stop-color="#64748b" />
      <stop offset="30%" stop-color="#94a3b8" />
      <stop offset="42%" stop-color="#cbd5e1" />
      <stop offset="45%" stop-color="#ffffff" />
      <stop offset="47%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#A6C8FF" />
      <stop offset="53%" stop-color="#cbd5e1" />
      <stop offset="65%" stop-color="#64748b" />
      <stop offset="80%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>

    <clipPath id="textClip">
      <text x="800" y="240" font-family="'Montserrat', 'Helvetica Neue', 'Arial Black', sans-serif" font-weight="900" font-size="94" letter-spacing="18" text-anchor="middle">MOHAMMAD IRFAN</text>
    </clipPath>

    <clipPath id="typeClip1">
      <rect x="0" y="-20" height="40" width="0">
        <animate attributeName="width" dur="25s" repeatCount="indefinite"
          values="0px;12px;35px;52px;88px;112px;130px;155px;172px;205px;230px;252px;280px;315px;315px;260px;190px;110px;40px;0px;0px"
          keyTimes="0;0.016;0.032;0.044;0.056;0.064;0.072;0.080;0.088;0.096;0.104;0.112;0.120;0.156;0.224;0.232;0.240;0.244;0.248;0.252;1"/>
      </rect>
    </clipPath>

    <clipPath id="typeClip2">
      <rect x="0" y="-20" height="40" width="0">
        <animate attributeName="width" dur="25s" repeatCount="indefinite"
          values="0px;0px;15px;45px;72px;105px;138px;160px;195px;212px;238px;238px;180px;120px;50px;0px;0px"
          keyTimes="0;0.200;0.216;0.232;0.244;0.256;0.264;0.272;0.284;0.296;0.312;0.356;0.376;0.384;0.392;0.396;1"/>
      </rect>
    </clipPath>

    <clipPath id="typeClip3">
      <rect x="0" y="-20" height="40" width="0">
        <animate attributeName="width" dur="25s" repeatCount="indefinite"
          values="0px;0px;12px;38px;65px;92px;118px;145px;180px;210px;242px;270px;292px;292px;220px;140px;60px;0px;0px"
          keyTimes="0;0.400;0.412;0.424;0.436;0.448;0.456;0.464;0.472;0.484;0.496;0.508;0.516;0.556;0.576;0.584;0.592;0.596;1"/>
      </rect>
    </clipPath>

    <clipPath id="typeClip4">
      <rect x="0" y="-20" height="40" width="0">
        <animate attributeName="width" dur="25s" repeatCount="indefinite"
          values="0px;0px;15px;40px;68px;95px;130px;162px;190px;222px;248px;270px;292px;292px;210px;130px;50px;0px;0px"
          keyTimes="0;0.600;0.612;0.624;0.636;0.648;0.656;0.664;0.672;0.684;0.696;0.708;0.716;0.756;0.776;0.784;0.792;0.796;1"/>
      </rect>
    </clipPath>

    <clipPath id="typeClip5">
      <rect x="0" y="-20" height="40" width="0">
        <animate attributeName="width" dur="25s" repeatCount="indefinite"
          values="0px;0px;12px;35px;60px;88px;115px;142px;170px;205px;235px;262px;285px;310px;310px;240px;160px;70px;0px;0px"
          keyTimes="0;0.800;0.812;0.824;0.836;0.848;0.856;0.864;0.872;0.880;0.888;0.896;0.904;0.912;0.956;0.976;0.984;0.992;0.996;1"/>
      </rect>
    </clipPath>
  </defs>

  <style>
    @keyframes diagonalShimmer {
      0% { transform: translate(-70%, -70%); }
      27% { transform: translate(70%, 70%); }
      100% { transform: translate(70%, 70%); }
    }

    @keyframes gridScroll {
      0% { transform: translateY(0px); }
      100% { transform: translateY(60px); }
    }

    @keyframes floatParticle {
      0% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
      50% { opacity: 0.7; }
      100% { transform: translateY(-40px) translateX(10px); opacity: 0; }
    }

    @keyframes reelRotation {
      0%, 16.66% { transform: translateY(0px); }
      20%, 36.66% { transform: translateY(-45px); }
      40%, 56.66% { transform: translateY(-90px); }
      60%, 76.66% { transform: translateY(-135px); }
      80%, 96.66% { transform: translateY(-180px); }
      100% { transform: translateY(-220px); }
    }

    @keyframes scanBeamUpdated {
      0%, 100% { left: 245px; width: 45px; }
      15% { left: 245px; width: 45px; }       
      20% { left: 340px; width: 65px; }       
      35% { left: 340px; width: 65px; }       
      40% { left: 455px; width: 60px; }       
      55% { left: 455px; width: 60px; }       
      60% { left: 565px; width: 200px; }      
      75% { left: 565px; width: 200px; }      
      80% { left: 815px; width: 290px; }      
      95% { left: 815px; width: 290px; }      
    }
    
    @keyframes glowSEO { 0%, 15%, 100% { fill: #FFFFFF; filter: drop-shadow(0 0 6px #5DA8FF); } 20%, 95% { fill: #475569; filter: none; } }
    @keyframes glowAzure { 0%, 15%, 40%, 100% { fill: #475569; filter: none; } 20%, 35% { fill: #FFFFFF; filter: drop-shadow(0 0 6px #5DA8FF); } }
    @keyframes glowCICD { 0%, 35%, 60%, 100% { fill: #475569; filter: none; } 40%, 55% { fill: #FFFFFF; filter: drop-shadow(0 0 6px #5DA8FF); } }
    @keyframes glowMCP { 0%, 55%, 80%, 100% { fill: #475569; filter: none; } 60%, 75% { fill: #FFFFFF; filter: drop-shadow(0 0 6px #5DA8FF); } }
    @keyframes glowRAG { 0%, 75%, 100% { fill: #475569; filter: none; } 80%, 95% { fill: #FFFFFF; filter: drop-shadow(0 0 6px #5DA8FF); } }

    @keyframes slowRotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes consoleCaretPulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.85; }
    }

    /* Isolated opacity timelines ensuring absolute zero duplicate/overlap visibility */
    @keyframes slotVisibility1 { 0%, 24.99% { opacity: 1; visibility: visible; } 25%, 100% { opacity: 0; visibility: hidden; } }
    @keyframes slotVisibility2 { 0%, 19.99% { opacity: 0; visibility: hidden; } 20%, 44.99% { opacity: 1; visibility: visible; } 45%, 100% { opacity: 0; visibility: hidden; } }
    @keyframes slotVisibility3 { 0%, 39.99% { opacity: 0; visibility: hidden; } 40%, 64.99% { opacity: 1; visibility: visible; } 65%, 100% { opacity: 0; visibility: hidden; } }
    @keyframes slotVisibility4 { 0%, 59.99% { opacity: 0; visibility: hidden; } 60%, 84.99% { opacity: 1; visibility: visible; } 85%, 100% { opacity: 0; visibility: hidden; } }
    @keyframes slotVisibility5 { 0%, 79.99% { opacity: 0; visibility: hidden; } 80%, 99.99% { opacity: 1; visibility: visible; } 100% { opacity: 0; visibility: hidden; } }
  </style>

  <rect width="1600" height="500" fill="url(#bgGlitch)" />

  <g opacity="0.15">
    <g transform="translate(0, 0)">
      <pattern id="gridPattern" width="80" height="60" patternUnits="userSpaceOnUse">
        <path d="M 80 0 L 0 0 0 60" fill="none" stroke="#5DA8FF" stroke-width="1" />
      </pattern>
      <rect width="1600" height="600" fill="url(#gridPattern)">
        <animate transform="attributeName" type="XML" attributeName="y" from="0" to="60" dur="2.5s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
  <rect width="1600" height="500" fill="url(#gridFade)" pointer-events="none" />

  <g fill="#9DBDFF" opacity="0.4">
    <circle cx="200" cy="120" r="1.5"><animate attributeName="transform" type="translate" values="0,0; 15,-30" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="380" r="2"><animate attributeName="transform" type="translate" values="0,0; -10,-40" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="1350" cy="90" r="1"><animate attributeName="transform" type="translate" values="0,0; 20,-20" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="1420" cy="420" r="2.5"><animate attributeName="transform" type="translate" values="0,0; -25,-50" dur="11s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="60" r="1.5"><animate attributeName="transform" type="translate" values="0,0; 5,-25" dur="8s" repeatCount="indefinite"/></circle>
  </g>

  <g transform="translate(90, 415)" opacity="0.10">
    <circle r="25" fill="none" stroke="#5DA8FF" stroke-width="1" stroke-dasharray="4, 6" style="animation: slowRotation 45s linear infinite;" />
    <circle r="16" fill="none" stroke="#9DBDFF" stroke-width="0.75" />
    <line x1="-32" y1="0" x2="32" y2="0" stroke="#5DA8FF" stroke-width="0.5" />
  </g>

  <g transform="translate(1490, 250)" opacity="0.25">
    <circle r="80" fill="none" stroke="#5DA8FF" stroke-width="0.75" stroke-dasharray="20, 4" style="animation: slowRotation 30s linear infinite;" />
    <circle r="55" fill="none" stroke="#A6C8FF" stroke-width="1" />
    <line x1="0" y1="-95" x2="0" y2="95" stroke="#5DA8FF" stroke-width="0.5" />
    <path d="M -40,-40 L 40,40 M -40,40 L 40,-40" stroke="#5DA8FF" stroke-width="0.5" stroke-dasharray="2, 4" />
  </g>

  <g transform="translate(32, 28)">
    <g font-family="'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace" text-anchor="start">
      
      <text x="0" y="13" font-size="13" font-weight="500" fill="#5DA8FF" fill-opacity="0.75" letter-spacing="0">&gt; currently_building()</text>

      <rect x="180" y="1" width="2" height="13" fill="#5DA8FF" style="animation: consoleCaretPulse 1.2s ease-in-out infinite;" />

      <g transform="translate(0, 36)" font-size="11" font-weight="400" fill="#e2e8f0" fill-opacity="0.75">
        <g clip-path="url(#typeClip1)" style="animation: slotVisibility1 20s infinite;"><text x="0" y="0" letter-spacing="0">Full Stack Web Applications...</text></g>
        <g clip-path="url(#typeClip2)" style="animation: slotVisibility2 25s infinite;"><text x="0" y="0" letter-spacing="0">AI SaaS Applications...</text></g>
        <g clip-path="url(#typeClip3)" style="animation: slotVisibility3 25s infinite;"><text x="0" y="0" letter-spacing="0">Modern Business Websites...</text></g>
        <g clip-path="url(#typeClip4)" style="animation: slotVisibility4 25s infinite;"><text x="0" y="0" letter-spacing="0">AI Automation Solutions...</text></g>
        <g clip-path="url(#typeClip5)" style="animation: slotVisibility5 25s infinite;"><text x="0" y="0" letter-spacing="0">Cross-Platform Applications...</text></g>
      </g>
    </g>
  </g>

  <g transform="translate(1568, 28)" font-family="'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace" font-size="10" fill="#5DA8FF" opacity="0.35" letter-spacing="1" text-anchor="end">
    <text x="0" y="13">SEC // 0x7F9A2B</text>
    <text x="0" y="36">LRN // CORE_ENGINE</text>
  </g>

  <text x="800" y="240" font-family="'Montserrat', 'Helvetica Neue', 'Arial Black', sans-serif" font-weight="900" font-size="94" letter-spacing="18" text-anchor="middle" fill="#151f32" opacity="0.95">MOHAMMAD IRFAN</text>

  <g clip-path="url(#textClip)">
    <rect x="0" y="0" width="1600" height="500" fill="#24334c" />
    <g>
      <rect x="-400" y="-400" width="2400" height="1300" fill="url(#titaniumShine)">
        <animateTransform 
          attributeName="transform" 
          type="translate" 
          from="-600, -600" 
          to="800, 800" 
          dur="5.5s" 
          repeatCount="indefinite"
          keyTimes="0; 0.27; 1"
          keySplines="0.4 0 0.2 1; 0 0 1 1"
          calcMode="spline"
        />
      </rect>
    </g>
  </g>

  <text x="800" y="240" font-family="'Montserrat', 'Helvetica Neue', 'Arial Black', sans-serif" font-weight="900" font-size="94" letter-spacing="18" text-anchor="middle" fill="none" stroke="#ffffff" stroke-width="0.75" opacity="0.6" style="mix-blend-mode: overlay;" />
  <text x="800" y="240" font-family="'Montserrat', 'Helvetica Neue', 'Arial Black', sans-serif" font-weight="900" font-size="94" letter-spacing="18" text-anchor="middle" fill="none" stroke="#5DA8FF" stroke-width="0.25" opacity="0.8" filter="url(#subtleGlow)"/>

  <g transform="translate(800, 310)">
    <line x1="-160" y1="-28" x2="160" y2="-28" stroke="#5DA8FF" stroke-width="1" opacity="0.25" />
    <line x1="-40" y1="-28" x2="40" y2="-28" stroke="#A6C8FF" stroke-width="1.5" opacity="0.7" />
    
    <line x1="-160" y1="18" x2="160" y2="18" stroke="#5DA8FF" stroke-width="1" opacity="0.25" />
    <line x1="-40" y1="18" x2="40" y2="18" stroke="#A6C8FF" stroke-width="1.5" opacity="0.7" />

    <g clip-path="url(#roleClip)">
      <clipPath id="roleClip">
        <rect x="-300" y="-25" width="600" height="40" />
      </clipPath>
      
      <g style="animation: reelRotation 15s cubic-bezier(0.76, 0, 0.24, 1) infinite;">
        <text x="0" y="2" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="19" fill="#9DBDFF" letter-spacing="4" text-anchor="middle">SOFTWARE DEVELOPER</text>
        <text x="0" y="47" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="19" fill="#FFFFFF" letter-spacing="4" text-anchor="middle">FULL STACK DEVELOPER</text>
        <text x="0" y="92" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="19" fill="#5DA8FF" letter-spacing="4" text-anchor="middle">AI ENGINEER</text>
        <text x="0" y="137" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="19" fill="#FFFFFF" letter-spacing="4" text-anchor="middle">GENERATIVE AI</text>
        <text x="0" y="182" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="19" fill="#9DBDFF" letter-spacing="4" text-anchor="middle">B.TECH AI &amp; ML STUDENT</text>
        <text x="0" y="227" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="19" fill="#9DBDFF" letter-spacing="4" text-anchor="middle">SOFTWARE DEVELOPER</text>
      </g>
    </g>
  </g>

  <g transform="translate(800, 415)">
    <g transform="translate(-565, 0)" font-family="'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="11" letter-spacing="2">
      <text x="0" y="2" fill="#5DA8FF" opacity="0.6">CURRENTLY LEARNING :</text>
      
      <g font-size="11">
        <text x="245" y="2" style="animation: glowSEO 15s ease-in-out infinite;">SEO</text>
        <text x="340" y="2" style="animation: glowAzure 15s ease-in-out infinite;">AZURE</text>
        <text x="455" y="2" style="animation: glowCICD 15s ease-in-out infinite;">CI/CD</text>
        <text x="565" y="2" style="animation: glowMCP 15s ease-in-out infinite;">MODEL CONTEXT PROTOCOL</text>
        <text x="815" y="2" style="animation: glowRAG 15s ease-in-out infinite;">RAG BASED SYSTEMS</text>
      </g>

      <g transform="translate(0, -12)">
        <line x1="0" y1="23" x2="25" y2="23" stroke="#A6C8FF" stroke-width="2" filter="url(#subtleGlow)">
          <animate attributeName="x1" values="245; 245; 340; 340; 455; 455; 565; 565; 815; 815; 245" dur="15s" keyTimes="0; 0.15; 0.20; 0.35; 0.40; 0.55; 0.60; 0.75; 0.80; 0.95; 1" calcMode="linear" repeatCount="indefinite" />
          <animate attributeName="x2" values="290; 290; 405; 405; 515; 515; 765; 765; 1105; 1105; 290" dur="15s" keyTimes="0; 0.15; 0.20; 0.35; 0.40; 0.55; 0.60; 0.75; 0.80; 0.95; 1" calcMode="linear" repeatCount="indefinite" />
        </line>
      </g>
    </g>
  </g>
</svg>
