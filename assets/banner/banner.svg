</text>

<!-- Sub roles -->
<text x="800" y="256" text-anchor="middle" font-family="'Inter', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#CBD5E1" letter-spacing="0.6">
  Full Stack Developer &#8226; AI Engineer
</text>
<text x="800" y="280" text-anchor="middle" font-family="'Inter', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#CBD5E1" letter-spacing="0.6">
  AI &amp; ML Student &#8226; Product Builder
</text>

<!-- Divider -->
<line x1="660" y1="304" x2="940" y2="304" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1"/>

<!-- Tagline, improved readability -->
<text x="800" y="332" text-anchor="middle" font-family="'Inter', Helvetica, Arial, sans-serif" font-size="15.5" font-weight="300" fill="#B4C2D6" letter-spacing="0.3">
  Building AI-powered software, SaaS platforms, automation solutions,
</text>
<text x="800" y="354" text-anchor="middle" font-family="'Inter', Helvetica, Arial, sans-serif" font-size="15.5" font-weight="300" fill="#B4C2D6" letter-spacing="0.3">
  and modern web applications.
</text>

