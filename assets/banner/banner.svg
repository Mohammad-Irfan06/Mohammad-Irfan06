<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>

    <!-- ===================== BASE FIELD ===================== -->
    <radialGradient id="fieldVignette" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#0C1220"/>
      <stop offset="55%" stop-color="#080B14"/>
      <stop offset="100%" stop-color="#04050A"/>
    </radialGradient>

    <linearGradient id="horizonWash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3E6FD1" stop-opacity="0.05"/>
      <stop offset="45%" stop-color="#3E6FD1" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25"/>
    </linearGradient>

    <!-- blueprint grid -->
    <pattern id="bluePrintGrid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#5B8DEF" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="bluePrintGridFine" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#5B8DEF" stroke-opacity="0.02" stroke-width="0.5"/>
    </pattern>

    <!-- name shine -->
    <linearGradient id="shineBand" x1="-140" y1="-140" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="46%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FDF4E4" stop-opacity="0.95"/>
      <stop offset="54%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="nameBase" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F3F5F9"/>
      <stop offset="100%" stop-color="#E7ECF5"/>
    </linearGradient>

    <radialGradient id="scanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E9C088" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#5B8DEF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5B8DEF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5B8DEF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5B8DEF" stop-opacity="0"/>
    </radialGradient>

    <filter id="blurSoft" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="blurWide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blurTiny" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>

    <clipPath id="canvasClip">
      <rect x="0" y="0" width="1600" height="500"/>
    </clipPath>

    <clipPath id="nameClip">
      <text x="800" y="232" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="800" letter-spacing="4">MOHAMMAD IRFAN</text>
    </clipPath>

    <clipPath id="rolesViewport">
      <rect x="480" y="266" width="640" height="46"/>
    </clipPath>

    <clipPath id="scanRowClip">
      <rect x="410" y="404" width="780" height="52"/>
    </clipPath>

  </defs>

  <g clip-path="url(#canvasClip)">

    <!-- ============ LAYER 0 — BASE FIELD ============ -->
    <rect x="0" y="0" width="1600" height="500" fill="url(#fieldVignette)"/>
    <rect x="0" y="0" width="1600" height="500" fill="url(#horizonWash)"/>
    <rect x="0" y="0" width="1600" height="500" fill="url(#bluePrintGrid)"/>
    <rect x="0" y="0" width="1600" height="500" fill="url(#bluePrintGridFine)"/>

    <!-- ============ LAYER 1 — ORBIT RING SYSTEM ============ -->
    <g transform="translate(1460,86)">
      <g>
        <circle r="360" fill="none" stroke="#5B8DEF" stroke-opacity="0.09" stroke-width="1"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="90s" repeatCount="indefinite" additive="sum"/>
      </g>
      <g>
        <circle r="300" fill="none" stroke="#C99A5B" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="2 14"/>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="70s" repeatCount="indefinite" additive="sum"/>
      </g>
      <g>
        <circle r="230" fill="none" stroke="#5B8DEF" stroke-opacity="0.07" stroke-width="1" stroke-dasharray="1 6"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="50s" repeatCount="indefinite" additive="sum"/>
      </g>
      <circle r="90" fill="url(#orbGlow)"/>
    </g>

    <!-- mirrored quieter ring, lower-left -->
    <g transform="translate(120,470)" opacity="0.6">
      <circle r="220" fill="none" stroke="#5B8DEF" stroke-opacity="0.06" stroke-width="1">
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="110s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- ============ LAYER 2 — DIAGONAL DATA TRAILS ============ -->
    <g stroke="#5B8DEF" stroke-opacity="0.10" stroke-width="1" fill="none">
      <path d="M -50,60 L 420,540"><animate attributeName="stroke-dasharray" values="0,900;900,0" dur="9s" repeatCount="indefinite"/></path>
      <path d="M 1150,-60 L 1700,480" stroke="#C99A5B" stroke-opacity="0.10"><animate attributeName="stroke-dasharray" values="0,900;900,0" dur="11s" repeatCount="indefinite"/></path>
      <path d="M 300,-40 L 900,540" stroke-opacity="0.05"><animate attributeName="stroke-dasharray" values="0,1100;1100,0" dur="14s" repeatCount="indefinite"/></path>
    </g>

    <!-- ============ LAYER 3 — CORNER FRAME MARKS ============ -->
    <g stroke="#9FB3D9" stroke-opacity="0.4" stroke-width="1.2" fill="none">
      <path d="M 70,90 L 70,50 L 112,50"/>
      <path d="M 1530,90 L 1530,50 L 1488,50"/>
      <path d="M 70,410 L 70,450 L 112,450"/>
      <path d="M 1530,410 L 1530,450 L 1488,450"/>
    </g>
    <g stroke="#C99A5B" stroke-opacity="0.5" stroke-width="1">
      <line x1="70" y1="50" x2="90" y2="50"><animate attributeName="stroke-opacity" values="0.1;0.6;0.1" dur="4s" repeatCount="indefinite"/></line>
      <line x1="1510" y1="450" x2="1530" y2="450"><animate attributeName="stroke-opacity" values="0.1;0.6;0.1" dur="4.6s" repeatCount="indefinite"/></line>
    </g>

    <!-- ============ LAYER 4 — PARTICLES ============ -->
    <g>
      <circle cx="180" cy="140" r="1.6" fill="#C99A5B" opacity="0.5">
        <animate attributeName="cy" values="140;120;140" dur="9s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.1;0.6;0.1" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1420" cy="180" r="1.4" fill="#5B8DEF" opacity="0.5">
        <animate attributeName="cy" values="180;205;180" dur="10s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.1;0.5" dur="7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="260" cy="380" r="1.3" fill="#9FB3D9" opacity="0.4">
        <animate attributeName="cx" values="260;285;260" dur="12s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1330" cy="370" r="1.5" fill="#C99A5B" opacity="0.45">
        <animate attributeName="cx" values="1330;1300;1330" dur="11s" repeatCount="indefinite"/>
      </circle>
      <circle cx="760" cy="70" r="1.2" fill="#5B8DEF" opacity="0.4">
        <animate attributeName="opacity" values="0.1;0.5;0.1" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="980" cy="460" r="1.3" fill="#9FB3D9" opacity="0.35">
        <animate attributeName="opacity" values="0.4;0.1;0.4" dur="9.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="480" cy="450" r="1.1" fill="#C99A5B" opacity="0.35">
        <animate attributeName="opacity" values="0.1;0.45;0.1" dur="7.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1120" cy="90" r="1.2" fill="#5B8DEF" opacity="0.35">
        <animate attributeName="opacity" values="0.35;0.05;0.35" dur="8.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- ============ LAYER 5 — NAME (hero) ============ -->
    <text x="800" y="232" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="800" letter-spacing="4" fill="url(#nameBase)">MOHAMMAD IRFAN</text>

    <g clip-path="url(#nameClip)">
      <rect x="0" y="0" width="1600" height="500" fill="url(#shineBand)">
        <animateTransform attributeName="gradientTransform" type="translate" values="-900 -900;900 900" dur="5.5s" repeatCount="indefinite" begin="0.4s"/>
      </rect>
    </g>

    <!-- thin underline accent beneath name -->
    <line x1="700" y1="256" x2="900" y2="256" stroke="#C99A5B" stroke-opacity="0.55" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.25;0.6;0.25" dur="4s" repeatCount="indefinite"/>
    </line>

    <!-- ============ LAYER 6 — ROLE ROTATOR ============ -->
    <g clip-path="url(#rolesViewport)">
      <g transform="translate(0,0)">
        <text x="800" y="300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="500" letter-spacing="3" fill="#8FB1F0">SOFTWARE DEVELOPER</text>
        <text x="800" y="344" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="500" letter-spacing="3" fill="#8FB1F0">FULL STACK DEVELOPER</text>
        <text x="800" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="500" letter-spacing="3" fill="#8FB1F0">AI ENGINEER</text>
        <text x="800" y="432" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="500" letter-spacing="3" fill="#8FB1F0">GENERATIVE AI</text>
        <text x="800" y="476" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="500" letter-spacing="3" fill="#8FB1F0">B.TECH AI &amp; ML STUDENT</text>
        <text x="800" y="520" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="500" letter-spacing="3" fill="#8FB1F0">SOFTWARE DEVELOPER</text>
        <animateTransform attributeName="transform" type="translate"
          values="0,0; 0,0; 0,-44; 0,-44; 0,-88; 0,-88; 0,-132; 0,-132; 0,-176; 0,-176; 0,-220; 0,-220"
          keyTimes="0; 0.12; 0.167; 0.287; 0.333; 0.453; 0.5; 0.62; 0.667; 0.787; 0.833; 1"
          dur="15s" repeatCount="indefinite" calcMode="linear"/>
      </g>
    </g>

    <!-- ============ LAYER 7 — TAGLINE ============ -->
    <text x="800" y="352" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="300" letter-spacing="1.4" fill="#9FB3D9">
      Building Modern Software for the AI Era
    </text>

    <!-- ============ LAYER 8 — CURRENTLY LEARNING ============ -->
    <text x="800" y="393" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="600" letter-spacing="3.5" fill="#6E7C99">
      CURRENTLY LEARNING
    </text>

    <g clip-path="url(#scanRowClip)">
      <!-- skill chips -->
      <g font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500">
        <rect x="427" y="412" width="130" height="36" rx="18" fill="none" stroke="#5B8DEF" stroke-opacity="0.35" stroke-width="1"/>
        <text x="492" y="435" text-anchor="middle" fill="#C9D4EA">SEO</text>

        <rect x="581" y="412" width="130" height="36" rx="18" fill="none" stroke="#5B8DEF" stroke-opacity="0.35" stroke-width="1"/>
        <text x="646" y="435" text-anchor="middle" fill="#C9D4EA">Azure</text>

        <rect x="735" y="412" width="130" height="36" rx="18" fill="none" stroke="#5B8DEF" stroke-opacity="0.35" stroke-width="1"/>
        <text x="800" y="435" text-anchor="middle" fill="#C9D4EA">CI / CD</text>

        <rect x="889" y="412" width="130" height="36" rx="18" fill="none" stroke="#5B8DEF" stroke-opacity="0.35" stroke-width="1"/>
        <text x="954" y="435" text-anchor="middle" fill="#C9D4EA">MCP</text>

        <rect x="1043" y="412" width="130" height="36" rx="18" fill="none" stroke="#5B8DEF" stroke-opacity="0.35" stroke-width="1"/>
        <text x="1108" y="435" text-anchor="middle" fill="#C9D4EA">RAG</text>
      </g>

      <!-- scanning light sweep -->
      <g filter="url(#blurSoft)" style="mix-blend-mode:screen">
        <rect x="-40" y="404" width="70" height="52" fill="url(#scanGlow)">
          <animate attributeName="x" values="360;1150;1150;360" keyTimes="0;0.45;0.5;1" dur="6.5s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>

    <!-- ============ LAYER 9 — EDGE VIGNETTE ============ -->
    <rect x="0" y="0" width="1600" height="500" fill="none" stroke="#000000" stroke-width="40" opacity="0.25" filter="url(#blurWide)"/>

    <!-- ============ ENTRANCE FADE ============ -->
    <rect x="0" y="0" width="1600" height="500" fill="#04050A">
      <animate attributeName="opacity" values="1;0;0" dur="1.4s" fill="freeze"/>
    </rect>

  </g>
</svg>
